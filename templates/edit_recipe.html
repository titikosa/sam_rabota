{% extends "base.html" %}
{% block title %}Редактировать — {{ recipe['title'] }}{% endblock %}
{% block content %}
<a href="/recipe/{{ recipe['id'] }}" class="btn btn-secondary" style="margin-bottom:1.5rem; display:inline-block;">← Назад</a>
<h1>Редактировать рецепт</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<div class="card">
    <form method="POST" action="/edit/{{ recipe['id'] }}">
        <div class="form-group">
            <label for="title">Название *</label>
            <input type="text" id="title" name="title" value="{{ recipe['title'] }}">
        </div>
        <div class="form-group" style="display:flex; gap:1rem; flex-wrap:wrap;">
            <div style="flex:1; min-width:150px;">
                <label for="category">Категория</label>
                <select id="category" name="category">
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if recipe['category'] == cat %}selected{% endif %}>{{ cat.capitalize() }}</option>
                    {% endfor %}
                </select>
            </div>
            <div style="flex:1; min-width:150px;">
                <label for="cook_time">Время готовки</label>
                <input type="text" id="cook_time" name="cook_time" value="{{ recipe['cook_time'] }}">
            </div>
        </div>
        <div class="form-group">
            <label for="ingredients">Ингредиенты *</label>
            <textarea id="ingredients" name="ingredients" rows="5">{{ recipe['ingredients'] }}</textarea>
        </div>
        <div class="form-group">
            <label for="instructions">Способ приготовления *</label>
            <textarea id="instructions" name="instructions" rows="7">{{ recipe['instructions'] }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
    </form>
</div>
{% endblock %}
