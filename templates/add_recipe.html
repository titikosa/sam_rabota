{% extends "base.html" %}
{% block title %}Добавить рецепт{% endblock %}
{% block content %}
<a href="/" class="btn btn-secondary" style="margin-bottom:1.5rem; display:inline-block;">← Назад</a>
<h1>Новый рецепт</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<div class="card">
    <form method="POST" action="/add">
        <div class="form-group">
            <label for="title">Название *</label>
            <input type="text" id="title" name="title" placeholder="Например: Борщ украинский">
        </div>
        <div class="form-group" style="display:flex; gap:1rem; flex-wrap:wrap;">
            <div style="flex:1; min-width:150px;">
                <label for="category">Категория</label>
                <select id="category" name="category">
                    {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat.capitalize() }}</option>
                    {% endfor %}
                </select>
            </div>
            <div style="flex:1; min-width:150px;">
                <label for="cook_time">Время готовки</label>
                <input type="text" id="cook_time" name="cook_time" placeholder="Например: 30 минут">
            </div>
        </div>
        <div class="form-group">
            <label for="ingredients">Ингредиенты * (каждый с новой строки)</label>
            <textarea id="ingredients" name="ingredients" rows="5" placeholder="300г говядины&#10;2 картофелины"></textarea>
        </div>
        <div class="form-group">
            <label for="instructions">Способ приготовления *</label>
            <textarea id="instructions" name="instructions" rows="7" placeholder="1. Отварить мясо...&#10;2. Добавить овощи..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить рецепт</button>
    </form>
</div>
{% endblock %}
