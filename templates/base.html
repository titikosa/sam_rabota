<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мои Рецепты{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background: #fdf6ec; color: #2c2c2c; min-height: 100vh; }
        nav { background: #c0392b; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
        nav a.brand { color: #fff; font-size: 1.4rem; font-weight: bold; text-decoration: none; }
        nav a.btn-nav { background: #fff; color: #c0392b; padding: 8px 18px; border-radius: 4px; text-decoration: none; font-family: sans-serif; font-size: 0.9rem; font-weight: bold; }
        nav a.btn-nav:hover { background: #f0e0de; }
        .container { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; color: #c0392b; }
        h2 { font-size: 1.4rem; margin-bottom: 1rem; color: #333; }
        .btn { display: inline-block; padding: 10px 22px; border-radius: 4px; font-family: sans-serif; font-size: 0.9rem; font-weight: bold; cursor: pointer; text-decoration: none; border: none; }
        .btn-primary { background: #c0392b; color: #fff; }
        .btn-primary:hover { background: #a93226; }
        .btn-secondary { background: #eee; color: #333; }
        .btn-secondary:hover { background: #ddd; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .error { background: #fde8e8; border: 1px solid #e74c3c; color: #c0392b; padding: 12px 16px; border-radius: 4px; margin-bottom: 1rem; font-family: sans-serif; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-family: sans-serif; font-size: 0.9rem; font-weight: bold; margin-bottom: 6px; color: #555; }
        input[type="text"], textarea, select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; font-family: inherit; background: #fff; }
        input[type="text"]:focus, textarea:focus, select:focus { outline: none; border-color: #c0392b; }
        textarea { resize: vertical; min-height: 100px; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 1.5rem; margin-bottom: 1rem; }
        .badge { display: inline-block; background: #fde8e8; color: #c0392b; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-family: sans-serif; font-weight: bold; margin-right: 8px; }
        .meta { color: #888; font-size: 0.85rem; font-family: sans-serif; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="brand">🍳 Мои Рецепты</a>
        <a href="/add" class="btn-nav">+ Добавить рецепт</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
